<svg width="1200" height="475" viewBox="0 0 1200 475" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aliyas Group HRMS Banner</title>
  <desc id="desc">A custom banner for the Aliyas Group Human Resource Management System with dashboard cards and HR module illustrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#312E81"/>
      <stop offset="0.45" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#EEF2FF" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity="0.22"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>

  <rect width="1200" height="475" rx="34" fill="url(#bg)"/>
  <circle cx="1020" cy="72" r="170" fill="#A78BFA" opacity="0.24" filter="url(#soft)"/>
  <circle cx="190" cy="390" r="185" fill="#38BDF8" opacity="0.18" filter="url(#soft)"/>
  <path d="M0 360C155 285 281 352 418 291C564 226 602 118 765 138C919 156 1000 273 1200 195V475H0V360Z" fill="#FFFFFF" opacity="0.08"/>

  <g transform="translate(74 76)">
    <rect width="86" height="86" rx="24" fill="#FFFFFF" opacity="0.16"/>
    <rect x="18" y="23" width="50" height="42" rx="10" fill="#FFFFFF"/>
    <path d="M28 41h30M28 53h20" stroke="#4F46E5" stroke-width="6" stroke-linecap="round"/>
    <circle cx="61" cy="29" r="10" fill="#22C55E"/>
  </g>

  <text x="74" y="202" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="-2">
    Aliyas Group HRMS
  </text>
  <text x="78" y="250" fill="#DDD6FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600">
    Human Resource Management System
  </text>
  <text x="78" y="294" fill="#E0E7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" opacity="0.92">
    Employees • Attendance • Payroll • Reports • Analytics
  </text>

  <g transform="translate(78 334)">
    <rect width="154" height="46" rx="23" fill="#FFFFFF" opacity="0.16"/>
    <circle cx="27" cy="23" r="8" fill="#22C55E"/>
    <text x="45" y="30" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Live Dashboard</text>
  </g>
  <g transform="translate(250 334)">
    <rect width="150" height="46" rx="23" fill="#FFFFFF" opacity="0.16"/>
    <circle cx="27" cy="23" r="8" fill="#FBBF24"/>
    <text x="45" y="30" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">ERP Ready</text>
  </g>

  <g transform="translate(690 70)" filter="url(#shadow)">
    <rect width="420" height="326" rx="30" fill="url(#card)"/>
    <rect x="28" y="28" width="364" height="54" rx="18" fill="#EEF2FF"/>
    <circle cx="58" cy="55" r="14" fill="#4F46E5"/>
    <rect x="83" y="44" width="140" height="12" rx="6" fill="#6366F1" opacity="0.7"/>
    <rect x="83" y="62" width="92" height="8" rx="4" fill="#94A3B8" opacity="0.7"/>

    <g transform="translate(28 110)">
      <rect width="104" height="82" rx="20" fill="#DBEAFE"/>
      <text x="20" y="35" fill="#1D4ED8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Employees</text>
      <text x="20" y="64" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">450</text>
    </g>
    <g transform="translate(158 110)">
      <rect width="104" height="82" rx="20" fill="#DCFCE7"/>
      <text x="20" y="35" fill="#047857" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Present</text>
      <text x="20" y="64" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">420</text>
    </g>
    <g transform="translate(288 110)">
      <rect width="104" height="82" rx="20" fill="#FEF3C7"/>
      <text x="20" y="35" fill="#B45309" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Leave</text>
      <text x="20" y="64" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">15</text>
    </g>

    <rect x="28" y="220" width="170" height="76" rx="20" fill="#F8FAFC"/>
    <rect x="48" y="270" width="20" height="16" rx="6" fill="#4F46E5"/>
    <rect x="78" y="248" width="20" height="38" rx="6" fill="#7C3AED"/>
    <rect x="108" y="236" width="20" height="50" rx="6" fill="#DB2777"/>
    <rect x="138" y="258" width="20" height="28" rx="6" fill="#0891B2"/>

    <rect x="222" y="220" width="170" height="76" rx="20" fill="#F8FAFC"/>
    <circle cx="262" cy="258" r="25" fill="none" stroke="#4F46E5" stroke-width="12"/>
    <path d="M262 233A25 25 0 0 1 286 265" stroke="#22C55E" stroke-width="12" stroke-linecap="round"/>
    <rect x="305" y="242" width="48" height="9" rx="4.5" fill="#94A3B8"/>
    <rect x="305" y="261" width="66" height="9" rx="4.5" fill="#CBD5E1"/>
  </g>
</svg>
